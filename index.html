<script>
// Suppress benign cross-origin "Script error." from Babel's in-browser eval
(function() {
  const origError = console.error.bind(console);
  console.error = function(...args) {
    if (args.length && typeof args[0] === 'string' && args[0].startsWith('Script error')) return;
    origError(...args);
  };
  window.addEventListener('error', (e) => {
    if (e.message === 'Script error.' && !e.filename) { e.preventDefault(); e.stopImmediatePropagation(); return false; }
  }, true);
})();
</script>
